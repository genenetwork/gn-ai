<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeneNetwork AI Search – Sign In</title>
    <script src="https://unpkg.com/htmx.org@2.0.8"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.4/sse.js"></script>
    <script src="https://unpkg.com/hyperscript.org@0.9.12"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* === Login Page Specific Styles === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem 1.8rem 2.2rem 1.8rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.08);
            transition: transform 0.2s ease;
        }

        .login-card:hover {
            transform: translateY(-3px);
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(120deg, #c084fc, #60a5fa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .brand p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            color: #e2e8f0;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            letter-spacing: 0.3px;
        }

        .input-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 1rem;
            font-size: 1rem;
            color: #f1f5f9;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.3);
            background: rgba(30, 41, 59, 0.8);
        }

        .input-group input::placeholder {
            color: #64748b;
            font-size: 0.9rem;
        }

        button {
            width: 100%;
            background: linear-gradient(95deg, #4f46e5, #7c3aed);
            border: none;
            padding: 0.85rem;
            border-radius: 1.5rem;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.5rem;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        button:hover {
            background: linear-gradient(95deg, #6366f1, #8b5cf6);
            transform: scale(0.98);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
        }

        .footer-note {
            text-align: center;
            margin-top: 1.8rem;
            font-size: 0.75rem;
            color: #64748b;
        }

        .footer-note a {
            color: #a78bfa;
            text-decoration: none;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }

        /* Simple error styling (if any flash messages appear) */
        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border-left: 4px solid #ef4444;
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
            color: #fecaca;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <h1> GeneNetwork</h1>
                <p>AI-powered genomics search</p>
            </div>

            <!-- Show error if provided via query param or flash (optional) -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="error-message">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="post" action="/login">
                <div class="input-group">
                    <label>📧 Email address</label>
                    <input type="email" name="email" placeholder="you@example.org" required autofocus>
                </div>
                <div class="input-group">
                    <label>🔒 Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit">Sign in →</button>
            </form>
            <div class="footer-note">
                Secure access · <a href="#">Request access</a>
            </div>
        </div>
    </div>
</body>
</html>
