<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GeneNetwork AI Search – Sign In</title>
        <script src="https://unpkg.com/htmx.org@2.0.8"></script>
        <script src="https://unpkg.com/htmx-ext-sse@2.2.4/sse.js"></script>
        <script src="https://unpkg.com/hyperscript.org@0.9.12"></script>
        <link rel="stylesheet"
              href="{{ url_for('static', filename='css/style.css') }}">
    </head>
    <body class="login-page">
        <div class="header">
            <div class="header-logo">GN</div>
            <div class="header-title">GeneNetwork AI Search</div>
        </div>
        <div class="login-container">
            <div class="login-card">
                <div class="login-brand">
                    <h1>GeneNetwork</h1>
                    <p>AI-powered genomics search</p>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="error-message">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="post" action="/login" class="login-form">
                    <div class="input-group">
                        <label for="email">Email address</label>
                        <input type="email"
                               id="email"
                               name="email"
                               placeholder="you@example.org"
                               required
                               autofocus>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password"
                               id="password"
                               name="password"
                               placeholder="••••••••"
                               required>
                    </div>
                    <button type="submit" class="btn-primary">Sign in</button>
                </form>
                <div class="login-footer">
                    Genenetwork AI Search
                </div>
            </div>
        </div>
    </body>
</html>
